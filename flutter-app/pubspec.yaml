name: sentry
description: Crash detection and response MVP.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^7.0.0
  geolocator: ^14.0.2
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/diagrams.md
    - assets/report-template.md
    - assets/logo.png
